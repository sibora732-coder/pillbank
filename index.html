<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pill Bank</title>
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: #f8e8d6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .app {
            max-width: 520px;
            width: 100%;
            background: #fff;
            border-radius: 22px;
            padding: 32px;
            box-shadow: 0 16px 32px rgba(0,0,0,0.12);
            text-align: center;
            border: 3px solid #ffd9b3;
        }

        h1 {
            margin: 0 0 12px;
            color: #d35400;
            font-size: 2.2rem;
        }

        .cat {
            font-size: 44px;
            margin-bottom: 12px;
        }

        .stat-grid {
            text-align: left;
            background: #fff7eb;
            border-radius: 14px;
            padding: 18px;
            margin: 20px 0;
            border: 2px dashed #ffb26b;
        }

        .stat-grid p {
            margin: 6px 0;
            font-size: 15px;
        }

        .btn {
            display: inline-block;
            margin: 6px;
            padding: 14px 26px;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            background: #ffa559;
            color: #fff;
            cursor: pointer;
            transition: 0.2s ease;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(255,165,89,0.4);
        }

        .btn:hover { background: #ff7f1f; }
        .btn:disabled {
            background: #c7c7c7;
            cursor: not-allowed;
            box-shadow: none;
        }

        h3 {
            margin-top: 22px;
            color: #e1701a;
        }

        #status {
            margin-top: 20px;
            text-align: left;
            max-height: 120px;
            overflow-y: auto;
            font-size: 14px;
            color: #4a4a4a;
            border-top: 1px solid #eee;
            padding-top: 12px;
        }
    </style>
</head>
<body>

    <div class="app">
        <div class="cat">🐾😺</div>
        <h1>Pill Bank</h1>
        <p>Connect your wallet to interact with the contract.</p>

        <div>
            <button id="connect-btn" class="btn">Connect Wallet</button>
            <button id="mint-btn" class="btn" disabled>Mint (Owner Only)</button>
        </div>

        <div class="stat-grid">
            <p><strong>Token Contract:</strong> <span id="token-address">0x4039…58ca</span></p>
            <p><strong>Treasury Wallet:</strong> <span id="treasury-address">0x4039…58ca</span></p>
            <p><strong>Your Address:</strong> <span id="wallet-address">Not connected</span></p>
            <p><strong>BTC Balance:</strong> <span id="btc-balance">0</span></p>
            <p><strong>YARA Balance:</strong> <span id="yara-balance">0</span></p>
            <p><strong>Staked:</strong> <span id="staked-balance">0</span></p>
        </div>

        <h3>Staking</h3>
        <button id="approve-btn" class="btn" disabled>Approve</button>
        <button id="stake-btn" class="btn" disabled>Stake</button>
        <button id="unstake-btn" class="btn" disabled>Unstake</button>

        <div id="status"></div>
    </div>

    <script src="CatBank.js"></script>
</body>
</html>
