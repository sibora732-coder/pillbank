<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pill Bank</title>
    <!-- Добавляем defer, чтобы скрипт ждал загрузки кнопок -->
    <script src="CatBank.js" defer></script>
    <style>
        body { background: #f8e8d6; font-family: sans-serif; padding: 20px; }
        button { padding: 10px 20px; font-size: 16px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Cat Bank</h1>
    
    <!-- Кнопки с правильными ID -->
    <button id="connect-btn">Connect Wallet</button>
    <button id="mint-btn">Mint YARA</button>
    
    <div id="status" style="margin-top: 20px; color: red;"></div>
    
    <!-- Скрытые элементы, чтобы JS не ругался, если они есть в коде -->
    <div style="display:none;">
        <span id="wallet-address"></span>
        <span id="btc-balance"></span>
        <span id="yara-balance"></span>
        <span id="staked-balance"></span>
        <button id="approve-btn"></button>
        <button id="stake-btn"></button>
        <button id="unstake-btn"></button>
    </div>
</body>
</html>
