<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PillBank: A Piggy Bank for My Favorite Kitty!</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            max-width: 900px;
            width: 100%;
        }
        
        .page-title {
            color: #e74c3c;
            font-size: 32px;
            margin-bottom: 15px;
        }
        
        .page-subtitle {
            color: #555;
            font-size: 16px;
            margin-bottom: 30px;
        }
        
        .cat-photo {
            width: 300px;
            height: 220px;
            object-fit: cover;
            border-radius: 12px;
            margin: 0 auto 25px;
            display: block;
        }
        
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        
        .btn {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(39, 174, 96, 0.3);
        }
        
        .btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-notice {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="page-title">🐱 PillBank: A Piggy Bank for My Favorite Kitty! 💊</h1>
        <p class="page-subtitle">Mint, stake, and store pills (YARA tokens) in your piggy bank. Powered by OP_NET!</p>
        <img src="kitti YARA.jpg" alt="My Favorite Kitty" class="cat-photo" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐱</text></svg>'">
        <div class="btn-container">
            <button id="btn-connect" class="btn">Connect OP Wallet</button>
            <button id="btn-mint" class="btn" disabled>Mint YARA (Add Pills)</button>
            <button id="btn-stake" class="btn" disabled>Stake YARA (Save to Bank)</button>
            <button id="btn-view" class="btn" disabled>View Wallet</button>
        </div>
        <div id="error-area" class="error-notice"></div>
    </div>
    <script>
        const CONFIG = { 
            NETWORK: "testnet3", 
            TOKEN_ADDRESS: "0x403925f98169763bd2dd78b73cdc20421a4b2df7fa3ea171abba278dce2458ca", 
            OWNER_ADDRESS: "opt1pcx4nk6acad6z43qt0fh5t7lcdt65yp2uh3mcvzc3h0vxkurkhkus8l8q8m" 
        };
        const btnConnect = document.getElementById("btn-connect");
        const btnMint = document.getElementById("btn-mint");
        const btnStake = document.getElementById("btn-stake");
        const btnView = document.getElementById("btn-view");
        const errorArea = document.getElementById("error-area");

        function showError(msg) {
            errorArea.innerText = msg;
            setTimeout(() => errorArea.innerText = "", 5000);
        }

        function getProvider() {
            return window.unisat || window.opnet;
        }

        async function connectWallet() {
            try {
                const provider = getProvider();
                if (!provider) {
                    alert("Установи расширение OP Wallet или UniSat!");
                    showError("Error: Wallet extension not found");
                    return;
                }
                const accounts = await provider.requestAccounts();
                btnConnect.innerText = "Connected ✓";
                btnConnect.disabled = true;
                btnMint.disabled = false;
                btnStake.disabled = false;
                btnView.disabled = false;
                showError(`Подключено: ${accounts[0].slice(0, 8)}...${accounts[0].slice(-8)}`);
            } catch (err) {
                showError(`Ошибка подключения: ${err.message}`);
                console.error(err);
            }
        }

        async function mintYARA() {
            try {
                const provider = getProvider();
                await provider.signMessage("Подтвердите минтинг 100 YARA токенов");
                showError("✅ Минтинг выполнен успешно! +100 YARA");
            } catch (err) {
                showError(`Ошибка минтинга: ${err.message}`);
            }
        }

        async function stakeYARA() {
            try {
                const provider = getProvider();
                showError("Запрос на стейкинг отправлен в сеть OP_NET");
            } catch (err) {
                showError(`Ошибка стейкинга: ${err.message}`);
            }
        }

        async function viewWallet() {
            try {
                const provider = getProvider();
                if (!provider) {
                    showError("Сначала подключите кошелек!");
                    return;
                }
                const accounts = await provider.getAccounts();
                showError(`Баланс обновлен для адреса: ${accounts[0].slice(0, 10)}...`);
            } catch (err) {
                showError(`Ошибка получения баланса: ${err.message}`);
            }
        }

        btnConnect.addEventListener("click", connectWallet);
        btnMint.addEventListener("click", mintYARA);
        btnStake.addEventListener("click", stakeYARA);
        btnView.addEventListener("click", viewWallet);
    </script>
</body>
</html>
