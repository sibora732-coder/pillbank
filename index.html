<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pill Bank | Asset Management</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .app-card {
            max-width: 550px;
            width: 100%;
            background: #ffffff;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.12);
            text-align: center;
        }
        h1 { color: #d35400; margin-bottom: 5px; font-size: 2.4rem; }
        .subtitle { color: #7f8c8d; font-size: 14px; margin-bottom: 25px; }
        
        .token-info {
            background: #fff8f0;
            border: 1px dashed #e67e22;
            padding: 10px;
            border-radius: 8px;
            font-size: 11px;
            color: #d35400;
            word-break: break-all;
            margin-bottom: 20px;
        }

        .dashboard {
            text-align: left;
            background: #fdfdfd;
            border: 1px solid #f0f0f0;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .dashboard p { margin: 12px 0; font-size: 15px; color: #2c3e50; border-bottom: 1px solid #f9f9f9; padding-bottom: 8px; }
        .dashboard span { font-weight: bold; color: #e67e22; float: right; word-break: break-all; max-width: 60%; text-align: right; }

        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        
        .btn {
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-connect { background: #e67e22; color: white; grid-column: span 2; font-size: 18px; }
        .btn-connect:hover { background: #d35400; }
        
        .btn-mint { background: #27ae60; color: white; grid-column: span 2; }
        .btn-mint:hover { background: #219150; }
        
        .btn-stake { background: #3498db; color: white; }
        .btn-stake:hover { background: #2980b9; }

        .btn:disabled { background: #bdc3c7; cursor: not-allowed; transform: none; }

        #log-window {
            margin-top: 20px;
            background: #2c3e50;
            color: #27ae60;
            padding: 15px;
            border-radius: 10px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            text-align: left;
            height: 120px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div class="app-card">
        <h1>🐾 Pill Bank</h1>
        <p class="subtitle">OP_NET Asset Gateway</p>

        <div class="token-info">
            TOKEN: 0x403925f98169763bd2dd78b73cdc20421a4b2df7fa3ea171abba278dce2458ca
        </div>

        <button id="connect-btn" class="btn btn-connect">Connect Wallet</button>

        <div class="dashboard">
            <p>Status: <span id="status-text" style="color: #e74c3c;">Disconnected</span></p>
            <p>My Address: <span id="user-address">N/A</span></p>
            <p>BTC Balance: <span id="btc-val">0.0000</span></p>
            <p>YARA Balance: <span id="yara-val">0.00</span></p>
            <p>Staked Total: <span id="staked-val">0.00</span></p>
        </div>

        <div class="actions">
            <button id="mint-btn" class="btn btn-mint" disabled>Mint 10 YARA (Admin Only)</button>
            <button id="stake-btn" class="btn btn-stake" disabled>Stake YARA</button>
            <button id="unstake-btn" class="btn btn-stake" disabled>Unstake</button>
        </div>

        <div id="log-window">System ready. Please connect wallet.</div>
    </div>

    <script>
        // DATA PROVIDED BY USER
        const ADMIN_WALLET = "opt1pcx4nk6acad6z43qt0fh5t7lcdt65yp2uh3mcvzc3h0vxkurkhkus8l8q8m";
        const TOKEN_CONTRACT = "0x403925f98169763bd2dd78b73cdc20421a4b2df7fa3ea171abba278dce2458ca";

        // ELEMENTS
        const connectBtn = document.getElementById("connect-btn");
        const mintBtn = document.getElementById("mint-btn");
        const stakeBtn = document.getElementById("stake-btn");
        const unstakeBtn = document.getElementById("unstake-btn");
        const logWindow = document.getElementById("log-window");
        
        const addrDisplay = document.getElementById("user-address");
        const btcDisplay = document.getElementById("btc-val");
        const yaraDisplay = document.getElementById("yara-val");
        const statusDisplay = document.getElementById("status-text");

        function addLog(message, isError = false) {
            const time = new Date().toLocaleTimeString();
            const color = isError ? "#e74c3c" : "#2ecc71";
            logWindow.innerHTML = `<div style="color:${color}">[${time}] ${message}</div>` + logWindow.innerHTML;
        }

        async function connect() {
            try {
                const wallet = window.unisat || window.opnet;
                if (!wallet) {
                    alert("Wallet not found! Please install UniSat or OP Wallet.");
                    return;
                }

                addLog("Requesting connection...");
                const accounts = await wallet.requestAccounts();
                const currentAccount = accounts[0];

                // Update UI
                addrDisplay.innerText = currentAccount.substring(0, 8) + "..." + currentAccount.substring(currentAccount.length - 8);
                statusDisplay.innerText = "Connected";
                statusDisplay.style.color = "#27ae60";
                connectBtn.innerText = "Wallet Active";
                connectBtn.disabled = true;

                stakeBtn.disabled = false;
                unstakeBtn.disabled = false;

                addLog("User logged in: " + currentAccount);

                // Check Admin Access
                if (currentAccount.toLowerCase() === ADMIN_WALLET.toLowerCase()) {
                    mintBtn.disabled = false;
                    addLog("Admin permissions granted.");
                }

                // Initial Mock Balances
                btcDisplay.innerText = "0.0024";
                yaraDisplay.innerText = "250.00";

            } catch (err) {
                addLog("Error: " + err.message, true);
            }
        }

        async function mint() {
            try {
                const wallet = window.unisat || window.opnet;
                addLog("Signing mint transaction...");
                
                const txMsg = "Minting request for token: " + TOKEN_CONTRACT;
                const sig = await wallet.signMessage(txMsg);
                
                addLog("Signature received: " + sig.substring(0, 15) + "...");
                alert("Minting success! 10 YARA added to your wallet.");
                
                let val = parseFloat(yaraDisplay.innerText);
                yaraDisplay.innerText = (val + 10).toFixed(2);
            } catch (err) {
                addLog("Transaction failed: " + err.message, true);
            }
        }

        // BIND EVENTS
        connectBtn.addEventListener("click", connect);
        mintBtn.addEventListener("click", mint);
        
        stakeBtn.onclick = () => addLog("Stake feature is coming soon.");
        unstakeBtn.onclick = () => addLog("Unstake feature is coming soon.");

        addLog("Pill Bank initialized.");
    </script>
</body>
</html>
