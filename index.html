<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pill Bank</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdf2e9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            background-color: white;
            width: 100%;
            max-width: 520px;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(230, 126, 34, 0.2);
            text-align: center;
            border: 2px solid #e67e22;
        }
        
        .cat-photo {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 6px solid #e67e22;
            margin-bottom: 20px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }
        
        h1 {
            color: #d35400;
            margin: 10px 0 8px;
            font-size: 28px;
        }
        
        p.subtitle {
            color: #8b5a2b;
            font-size: 15px;
            margin-bottom: 20px;
        }
        
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        
        .btn {
            background: linear-gradient(135deg, #e67e22 0%, #d35400 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(211, 84, 0, 0.3);
            position: relative;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(211, 84, 0, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn:disabled {
            background: #d0d0d0;
            color: #909090;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .stats-box {
            background-color: #fff8f0;
            border-radius: 18px;
            padding: 22px;
            margin: 20px 0;
            text-align: left;
            border: 2px dashed #ffcc80;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 14px;
            font-size: 14px;
            color: #555;
            border-bottom: 1px solid #fae5d3;
            padding-bottom: 8px;
        }
        
        .stat-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }
        
        .stat-value {
            font-weight: bold;
            color: #d35400;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .log-area {
            margin-top: 20px;
            font-size: 13px;
            color: #999;
            text-align: left;
            max-height: 160px;
            overflow-y: auto;
            padding: 10px;
            background: #fbfbfb;
            border-radius: 10px;
            border-left: 3px solid #e67e22;
        }
        
        /* БЛОК STAKING с 4 кнопками */
        .staking-area {
            margin-top: 25px;
            padding: 20px;
            background: #faf5f0;
            border-radius: 16px;
            border: 1px solid #ffe0b2;
        }
        
        .staking-area h3 {
            color: #d35400;
            font-size: 18px;
            margin-bottom: 15px;
        }
    </style>
</head>

        </div>

        <div class="log-area" id="status-log">Waiting for connection...</div>
    </div>
