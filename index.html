<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pill Bank - Bitcoin Testnet</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap');

        :root {
            --bg-color: #1a1a1a;
            --primary-color: #f0f0f0;
            --accent-color: #ff4500;
            --border-color: #333;
            --button-hover-bg: #2a2a2a;
            --button-disabled-bg: #444;
            --button-disabled-color: #888;
        }

        body {
            font-family: 'Roboto Mono', monospace;
            background-color: var(--bg-color);
            color: var(--primary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background-color: #222;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        header {
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        header h1 {
            color: var(--accent-color);
            margin: 0;
            font-size: 2em;
        }

        header p {
            margin: 5px 0 0;
            font-size: 0.9em;
        }

        .wallet-info {
            background-color: var(--bg-color);
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }

        #connect-btn {
            width: 100%;
            padding: 15px;
            font-size: 1.1em;
            background-color: var(--accent-color);
            color: var(--primary-color);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        #connect-btn:hover {
            background-color: #e03e00;
        }

        #wallet-address {
            font-size: 0.8em;
            word-wrap: break-word;
            margin-top: 10px;
        }

        .balance, .actions {
            margin-bottom: 20px;
        }

        h2 {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
            font-size: 1.2em;
            color: var(--accent-color);
        }

        .balance-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
        }

        .actions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }

        .actions-grid button {
            padding: 12px;
            font-family: 'Roboto Mono', monospace;
            font-size: 1em;
            background-color: var(--bg-color);
            color: var(--primary-color);
            border: 1px solid var(--border-color);
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .actions-grid button:hover:not(:disabled) {
            background-color: var(--button-hover-bg);
        }

        .actions-grid button:disabled {
            background-color: var(--button-disabled-bg);
            color: var(--button-disabled-color);
            cursor: not-allowed;
        }

        .log {
            background-color: #111;
            border-radius: 5px;
            padding: 15px;
            height: 150px;
            overflow-y: auto;
            font-size: 0.8em;
            border: 1px solid var(--border-color);
        }

        #log-output p {
            margin: 0 0 5px;
            padding: 0;
        }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Pill Bank</h1>
            <p>BRC-20 Staking Simulation on Bitcoin Testnet</p>
        </header>

        <div class="wallet-info">
            <button id="connect-btn">Connect Wallet</button>
            <p id="wallet-address">Not connected</p>
        </div>

        <main id="app-content" style="display: none;">
            <section class="balance">
                <h2>My Wallet</h2>
                <div class="balance-item">
                    <span>YARA Balance:</span>
                    <span id="yara-balance">0</span>
                </div>
                <div class="balance-item">
                    <span>YARA Staked:</span>
                    <span id="yara-staked">0</span>
                </div>
            </section>

            <section class="actions">
                <h2>Actions</h2>
                <div class="actions-grid">
                    <button id="mint-btn" disabled>Mint (Owner Only)</button>
                    <button id="stake-btn" disabled>Stake YARA</button>
                    <button id="view-btn" disabled>View Wallet</button>
                </div>
            </section>

            <section class="log">
                <h2>Log</h2>
                <div id="log-output"></div>
            </section>
        </main>
    </div>

    <script>
        // --- DOM Elements ---
        const connectBtn = document.getElementById('connect-btn');
        const walletAddressEl = document.getElementById('wallet-address');
        const appContentEl = document.getElementById('app-content');
        const yaraBalEl = document.getElementById('yara-balance');
        const mintBtn = document.getElementById('mint-btn');
        const stakeBtn = document.getElementById('stake-btn');
        const viewBtn = document.getElementById('view-btn');
        const logOutput = document.getElementById('log-output');

        // --- State ---
        let connectedAccount = null;

        // --- Configuration ---
        // ВАЖНО: Замени этот адрес на свой собственный Bitcoin TESTNET адрес из кошелька UniSat.
        // Он должен начинаться с "tb1...".
        const OWNER_ADDR = "opt1pcx4nk6acad6z43qt0fh5t7lcdt65yp2uh3mcvzc3h0vxkurkhkus8l8q8m"; 

        // --- Event Listeners ---
        connectBtn.addEventListener('click', connectWallet);
        mintBtn.addEventListener('click', mintOwnerOnly);
        stakeBtn.addEventListener('click', stakeYara);
        viewBtn.addEventListener('click', viewWallet);

        // --- Functions ---
        function getProvider() {
            if (typeof window.unisat !== 'undefined') {
                return window.unisat;
            }
            alert("Пожалуйста, установите UniSat Wallet!");
            return null;
        }

        async function connectWallet() {
            const provider = getProvider();
            if (!provider) return;

            addLog("Connecting to wallet...");
            try {
                // Запрашиваем доступ к аккаунтам
                const accounts = await provider.requestAccounts();
                
                // Проверяем, что кошелек находится в тестовой сети Bitcoin
                const network = await provider.getNetwork();
                if (network !== 'testnet') {
                    alert("Ошибка: Пожалуйста, переключите ваш UniSat Wallet на сеть Bitcoin Testnet.");
                    addLog("Connection failed: Incorrect network.");
                    return;
                }

                // Если сеть правильная, продолжаем
                if (accounts.length > 0) {
                    connectedAccount = accounts[0];
                    updateUIOnConnect();
                    addLog(`Wallet connected: ${shortenAddress(connectedAccount)}`);
                    addLog(`Network: ${network}`);
                } else {
                    addLog("Connection failed: No accounts found.");
                }
            } catch (error) {
                console.error("Connection failed:", error);
                addLog(`Connection error: ${error.message}`);
                alert("Не удалось подключить кошелек. Убедитесь, что он разблокирован и попробуйте снова.");
            }
        }

        function updateUIOnConnect() {
            walletAddressEl.textContent = shortenAddress(connectedAccount);
            connectBtn.textContent = "Connected";
            connectBtn.disabled = true;
            appContentEl.style.display = 'block';

            stakeBtn.disabled = false;
            viewBtn.disabled = false;
            
            if (connectedAccount.toLowerCase() === OWNER_ADDR.toLowerCase()) {
                mintBtn.disabled = false;
                addLog("Owner account detected. Minting enabled.");
            }
        }

        // --- Placeholder Functions (будем их менять в следующих шагах) ---

        async function mintOwnerOnly() {
            if (!connectedAccount) return;
            if (connectedAccount.toLowerCase() !== OWNER_ADDR.toLowerCase()) {
                alert("Owner only");
                return;
            }
            const current = Number(yaraBalEl.textContent) || 0;
            yaraBalEl.textContent = String(current + 10);
            addLog(`[${ts()}] Mint simulated: +10 YARA`);
            alert("Mint simulated. Next step is to make a real BRC-20 transaction!");
        }

        async function stakeYara() {
            if (!connectedAccount) return;
            addLog(`[${ts()}] Stake simulated`);
            alert("Stake YARA simulated");
        }

        async function viewWallet() {
            if (!connectedAccount) return;
            addLog(`[${ts()}] View Wallet clicked`);
            alert("Wallet viewed (UI only)");
        }

        // --- Utility Functions ---

        function addLog(message) {
            const p = document.createElement('p');
            p.textContent = message;
            logOutput.prepend(p);
            console.log(message);
        }

        function shortenAddress(address) {
            if (!address) return "";
            return `${address.substring(0, 6)}...${address.substring(address.length - 4)}`;
        }
        
        function ts() {
            return new Date().toLocaleTimeString();
        }

    </script>
</body>
</html>
