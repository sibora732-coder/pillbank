<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PillBank: A Piggy Bank for My Favorite Kitty</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f8ff; text-align: center; padding: 20px; }
        h1 { color: #ff69b4; } /* Pink for cuteness */
        button { background: #4caf50; color: white; padding: 10px 20px; margin: 10px; border: none; cursor: pointer; border-radius: 5px; }
        button:hover { background: #45a049; }
        #walletInfo { font-size: 18px; margin: 20px; font-weight: bold; }
        .pill { font-size: 24px; color: #ff4500; } /* Pill icon */
        .cat { font-size: 50px; } /* Cat paws */
        footer { font-size: 12px; color: #666; margin-top: 30px; }
        footer a { color: #4caf50; text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body>
    <h1>🐱 PillBank: A Piggy Bank for My Favorite Kitty! 💊</h1>
    <p>Mint, stake, and store pills (YARA tokens) in your piggy bank. Powered by OP_NET!</p>

    <!-- Corrected image path for your GitHub file -->
    <img src="kitti%20YARA.jpg" alt="My favorite kitty" style="width:250px; border-radius:15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
    
    <div class="cat">🐾</div>
    
    <div>
        <button id="connectWallet">Connect OP Wallet</button>
        <button id="mintYara">Mint YARA (Add Pills)</button>
        <button id="stakeYara">Stake YARA (Save to Bank)</button>
        <button id="viewWallet">View Wallet</button>
    </div>
    
    <div id="walletInfo">Please connect your wallet...</div>
    
    <footer>
        <a href="deploy-opnet.md" target="_blank">Deploy on OP_NET</a> | 
        <a href="README.md" target="_blank">Documentation</a>
    </footer>

    <script>
        const walletInfo = document.getElementById('walletInfo');

        // Connect Wallet logic
        document.getElementById('connectWallet').addEventListener('click', async () => {
            if (window.opwallet) {
                try {
                    await window.opwallet.enable();
                    walletInfo.innerHTML = 'Wallet connected: ' + window.opwallet.selectedAddress;
                } catch (error) {
                    walletInfo.innerHTML = 'Error: ' + error.message;
                }
            } else {
                walletInfo.innerHTML = 'OP Wallet not installed!';
            }
        });

        // Mint YARA logic
        document.getElementById('mintYara').addEventListener('click', async () => {
            const tx = { to: 'bc1p...yara-contract-address', data: 'mint(100)', value: '0' };
            try {
                const result = await window.opwallet.sendTransaction(tx);
                walletInfo.innerHTML = '<span class="pill">💊</span> Minted 100 YARA! Tx: ' + result;
            } catch (error) {
                walletInfo.innerHTML = 'Mint failed: ' + error.message;
            }
        });

        // Stake YARA logic
        document.getElementById('stakeYara').addEventListener('click', async () => {
            const tx = { to: 'bc1p...stake-contract-address', data: 'stake(50)', value: '0' };
            try {
                const result = await window.opwallet.sendTransaction(tx);
                walletInfo.innerHTML = '<span class="pill">💊</span> Staked 50 YARA! Tx: ' + result;
            } catch (error) {
                walletInfo.innerHTML = 'Stake failed: ' + error.message;
            }
        });

        // View Wallet logic
        document.getElementById('viewWallet').addEventListener('click', async () => {
            try {
                const balance = await window.opwallet.getBalance();
                walletInfo.innerHTML = 'BTC: ' + balance.btc + ' | YARA: <span class="pill">💊</span> ' + balance.yara;
            } catch (error) {
                walletInfo.innerHTML = 'View failed: ' + error.message;
            }
        });
    </script>
</body>
</html>
