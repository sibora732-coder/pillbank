<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pill Bank | Official</title>
    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .app-container {
            max-width: 500px;
            width: 100%;
            background: #ffffff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        .description { color: #7f8c8d; margin-bottom: 25px; font-size: 14px; }
        
        .stats-panel {
            text-align: left;
            background: #f9f9fb;
            border: 1px solid #ececf1;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .stats-panel p { margin: 10px 0; font-size: 14px; color: #34495e; }
        .stats-panel span { font-weight: 600; color: #2980b9; word-break: break-all; }

        .btn-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        
        .btn {
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 140px;
        }
        .btn-primary { background: #3498db; color: white; }
        .btn-primary:hover { background: #2980b9; }
        
        .btn-secondary { background: #e67e22; color: white; }
        .btn-secondary:hover { background: #d35400; }
        
        .btn:disabled { background: #bdc3c7; cursor: not-allowed; opacity: 0.7; }

        .staking-box {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .staking-box h3 { color: #2c3e50; font-size: 18px; }

        #console-log {
            margin-top: 20px;
            padding: 12px;
            background: #2c3e50;
            color: #ecf0f1;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            text-align: left;
            max-height: 100px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>Pill Bank</h1>
        <p class="description">OP_NET Token Management System</p>

        <div class="btn-group">
            <button id="connect-wallet" class="btn btn-primary">Connect Wallet</button>
            <button id="mint-token" class="btn btn-secondary" disabled>Mint YARA</button>
        </div>

        <div class="stats-panel">
            <p>Address: <span id="user-address">Disconnected</span></p>
            <p>BTC Balance: <span id="balance-btc">0.0000</span></p>
            <p>YARA Balance: <span id="balance-yara">0.00</span></p>
            <p>Staked: <span id="balance-staked">0.00</span></p>
        </div>

        <div class="staking-box">
            <h3>Staking Farm</h3>
            <div class="btn-group">
                <button id="stake-approve" class="btn btn-primary" disabled>Approve</button>
                <button id="stake-deposit" class="btn btn-primary" disabled>Stake</button>
                <button id="stake-withdraw" class="btn btn-primary" disabled>Unstake</button>
            </div>
        </div>

        <div id="console-log">Initializing system...</div>
    </div>

    <script>
        // CONTRACT & OWNER DATA
        const OWNER_ADDR = "opt1pcx4nk6acad6z43qt0fh5t7lcdt65yp2uh3mcvzc3h0vxkurkhkus8l8q8m";
        
        // DOM ELEMENTS
        const btnConnect = document.getElementById("connect-wallet");
        const btnMint = document.getElementById("mint-token");
        const btnApprove = document.getElementById("stake-approve");
        const btnStake = document.getElementById("stake-deposit");
        const btnUnstake = document.getElementById("stake-withdraw");
        
        const spanAddr = document.getElementById("user-address");
        const spanBtc = document.getElementById("balance-btc");
        const spanYara = document.getElementById("balance-yara");
        const consoleLog = document.getElementById("console-log");

        function printLog(message, isError = false) {
            const timestamp = new Date().toLocaleTimeString();
            const color = isError ? "#e74c3c" : "#2ecc71";
            consoleLog.innerHTML = `<div style="color:${color}">[${timestamp}] ${message}</div>` + consoleLog.innerHTML;
        }
