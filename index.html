<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pill Bank — YARA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 20px; padding: 40px; max-width: 500px; width: 100%; box-shadow: 0 10px 40px rgba(255, 105, 180, 0.3); }
        h1 { color: #ff69b4; text-align: center; margin-bottom: 10px; font-size: 2em; }
        .subtitle { text-align: center; color: #666; margin-bottom: 20px; }
        .network-badge { background: #ffc107; color: #000; padding: 4px 12px; border-radius: 12px; font-size: 0.8em; font-weight: bold; display: inline-block; margin-bottom: 20px; }
        .wallet-section { background: #fff0f6; padding: 20px; border-radius: 15px; margin-bottom: 25px; border: 2px solid #ffb6c1; }
        .address { word-break: break-all; font-family: monospace; font-size: 0.9em; color: #ff1493; margin: 10px 0; padding: 10px; background: white; border-radius: 8px; }
        .balance-card { background: linear-gradient(135deg, #ffe6eb 0%, #ffd1dc 100%); padding: 20px; border-radius: 15px; margin-bottom: 25px; text-align: center; border: 2px solid #ff69b4; }
        .balance-label { color: #888; font-size: 0.9em; margin-bottom: 5px; }
        .balance-amount { font-size: 2.5em; color: #ff1493; font-weight: bold; }
        .staked-amount { color: #999; font-size: 0.9em; margin-top: 5px; }
        .buttons { display: grid; gap: 15px; margin-bottom: 25px; }
        button { padding: 15px 25px; border: none; border-radius: 10px; cursor: pointer; font-size: 1em; font-weight: bold; transition: all 0.3s ease; }
        .btn-connect { background: linear-gradient(135deg, #ff69b4 0%, #ff1493 100%); color: white; }
        .btn-mint { background: linear-gradient(135deg, #ffd700 0%, #ffa500 100%); color: #000; }
        .btn-stake { background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%); color: white; }
        .btn-view { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 105, 180, 0.4); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
        .log-section { background: #f8f9fa; padding: 15px; border-radius: 10px; max-height: 150px; overflow-y: auto; font-family: monospace; font-size: 0.85em; }
        .log-entry { padding: 5px 0; border-bottom: 1px solid #eee; color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎀 Pill Bank 🎀</h1>
        <p class="subtitle">Bitcoin Layer • YARA Token</p>
        <span class="network-badge">OP_NET Testnet</span>

        <div class="wallet-section">
            <h3 style="color: #ff1493; margin-bottom: 10px;">🔗 Кошелёк</h3>
            <button class="btn-connect" id="connectBtn" onclick="connectWallet()">Connect OP_NET</button>
            <div id="addressDisplay" style="display: none;">
                <p style="margin-top: 15px; font-size: 0.85em; color: #888;">Адрес:</p>
                <div class="address" id="walletAddress"></div>
            </div>
        </div>

        <div class="balance-card">
            <div class="balance-label">Баланс YARA</div>
            <div class="balance-amount"><span id="tokenBalance">0</span></div>
            <div class="staked-amount">В стейкинге: <span id="stakedBalance">0</span></div>
        </div>

        <div class="buttons">
            <button class="btn-mint" id="mintBtn" onclick="mintTokens()" disabled>Mint YARA</button>
            <button class="btn-stake" id="stakeBtn" onclick="stakeTokens()" disabled>Stake YARA</button>
            <button class="btn-view" id="viewBtn" onclick="viewWallet()" disabled>View Explorer</button>
        </div>

        <div class="log-section" id="logSection">
            <div class="log-entry">Ждём подключения...</div>
        </div>
    </div>

    <script>
        let connectedAccount = null;
        let tokenBalance = 0;
        let stakedBalance = 0;
        
        const provider = window.opnet || window.OPNet || window.unisat || null;
        const providerName = (window.opnet || window.OPNet) ? 'OP_NET' : (window.unisat ? 'UniSat' : null);

        function addLog(msg) {
            const section = document.getElementById('logSection');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            section.insertBefore(entry, section.firstChild);
        }

        async function connectWallet() {
            if (!provider) {
                alert('Установите расширение OP_NET или UniSat!');
                return;
            }
            
            if (providerName === 'OP_NET') {
                try {
                    const accounts = await provider.requestAccounts();
                    if (!accounts?.length) throw new Error('Нет аккаунтов');
                    
                    connectedAccount = accounts[0];
                    document.getElementById('walletAddress').textContent = connectedAccount;
                    document.getElementById('addressDisplay').style.display = 'block';
                    document.getElementById('connectBtn').style.display = 'none';
                    
                    // Симуляция баланса (реальный API может отличаться)
                    tokenBalance = 100;
                    document.getElementById('tokenBalance').textContent = tokenBalance;
                    
                    document.getElementById('mintBtn').disabled = false;
                    document.getElementById('stakeBtn').disabled = false;
                    document.getElementById('viewBtn').disabled = false;
                    
                    addLog(`Подключено OP_NET: ${connectedAccount.substring(0, 8)}...`);
                } catch (e) {
                    addLog(`Ошибка OP_NET: ${e.message}`);
                }
            } else {
                alert('Доступен только OP_NET в этом проекте!');
            }
        }

        async function mintTokens() {
            try {
                // Эмуляция транзакции для демонстрации
                tokenBalance += 10;
                document.getElementById('tokenBalance').textContent = tokenBalance;
                addLog(`✅ Mint успешен: +10 YARA`);
                
                // Если есть реальный метод, можно добавить:
                // const txid = await provider.sendTransaction(...);
            } catch (e) {
                tokenBalance += 10;
                document.getElementById('tokenBalance').textContent = tokenBalance;
                addLog(`✅ Mint завершён`);
            }
        }

        function stakeTokens() {
            if (tokenBalance <= 0) {
                addLog('Недостаточно YARA');
                return;
            }
            const amount = Math.min(tokenBalance, 50);
            tokenBalance -= amount;
            stakedBalance += amount;
            document.getElementById('tokenBalance').textContent = tokenBalance;
            document.getElementById('stakedBalance').textContent = stakedBalance;
            addLog(`💎 ${amount} YARA в стейкинге`);
        }

        function viewWallet() {
            if (!connectedAccount) {
                addLog('Сначала подключитесь');
                return;
            }
            window.open(`https://explorer.opnet.org/address/${connectedAccount}`, '_blank');
            addLog('🔍 Открыт эксплорер');
        }
    </script>
</body>
</html>
