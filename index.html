<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pill Bank</title>
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: #f8e8d6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .app {
            max-width: 520px;
            width: 100%;
            background: #fff;
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 16px 32px rgba(0,0,0,0.08);
            text-align: center;
        }
        h1 {
            margin: 0 0 12px;
            color: #d35400;
            font-size: 2rem;
        }
        .stat-grid {
            text-align: left;
            background: #fff3e0;
            border-radius: 12px;
            padding: 16px;
            margin: 18px 0;
        }
        .stat-grid p {
            margin: 6px 0;
        }
        .btn {
            display: inline-block;
            margin: 6px;
            padding: 12px 22px;
            font-size: 15px;
            border: none;
            border-radius: 10px;
            background: #e67e22;
            color: #fff;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        .btn:hover { background: #d35400; }
        .btn:disabled {
            background: #c7c7c7;
            cursor: not-allowed;
        }
        #status {
            margin-top: 18px;
            text-align: left;
            max-height: 110px;
            overflow-y: auto;
            font-size: 14px;
            color: #4a4a4a;
            border-top: 1px solid #eee;
            padding-top: 12px;
        }
    </style>
</head>
<body>
    <div class="app">
        <h1>🐾 Pill Bank</h1>
        <p>Подключите кошелёк и взаимодействуйте с контрактом.</p>

        <div>
            <button id="connect-btn" class="btn">Подключить кошелёк</button>
            <button id="mint-btn" class="btn" disabled>Mint (только владелец)</button>
        </div>

        <div class="stat-grid">
            <p><strong>Адрес:</strong> <span id="wallet-address">не подключен</span></p>
            <p><strong>BTC баланс:</strong> <span id="btc-balance">0</span></p>
            <p><strong>YARA баланс:</strong> <span id="yara-balance">0</span></p>
            <p><strong>В стейкинге:</strong> <span id="staked-balance">0</span></p>
        </div>

        <div>
            <h3>Staking</h3>
            <button id="approve-btn" class="btn" disabled>Approve</button>
            <button id="stake-btn" class="btn" disabled>Stake</button>
            <button id="unstake-btn" class="btn" disabled>Unstake</button>
        </div>

        <div id="status"></div>
    </div>

    <script src="CatBank.js"></script>
</body>
</html>
