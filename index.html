<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐾 Pill Bank</title>
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: #f8e8d6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .app {
            max-width: 520px;
            width: 100%;
            background: #fff;
            border-radius: 25px;
            padding: 28px;
            box-shadow: 0 16px 32px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
        }
        .app::after {
            content: "🐾";
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 2rem;
            color: #d35400;
        }
        h1 {
            margin: 0 0 12px;
            color: #d35400;
            font-size: 2.5rem;
        }
        .stat-grid {
            text-align: left;
            background: #fff3e0;
            border-radius: 12px;
            padding: 16px;
            margin: 18px 0;
        }
        .stat-grid p {
            margin: 6px 0;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }
        .btn {
            display: inline-block;
            margin: 6px;
            padding: 12px 22px;
            font-size: 15px;
            border: none;
            border-radius: 10px;
            background: #e67e22;
            color: #fff;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        .btn:hover { background: #d35400; }
        .btn:disabled {
            background: #c7c7c7;
            cursor: not-allowed;
        }
        #status {
            margin-top: 18px;
            text-align: left;
            max-height: 110px;
            overflow-y: auto;
            font-size: 14px;
            color: #4a4a4a;
            border-top: 1px solid #eee;
            padding-top: 12px;
        }
    </style>
</head>
<body>
    <div class="app">
        <h1>🐾 Pill Bank</h1>
        <p>Connect your wallet to interact with the contract.</p>
        <div>
            <button id="connect-btn" class="btn">Connect Wallet</button>
            <button id="mint-btn" class="btn" disabled>Mint (Owner Only)</button>
        </div>
        <div class="stat-grid">
            <p><strong>Token Contract:</strong> <span id="token-contract">0x403925...58ca</span></p>
            <p><strong>Treasury Wallet:</strong> <span id="treasury-wallet">opt1pcx4...q8m</span></p>
            <p><strong>Your Address:</strong> <span id="user-address">Not connected</span></p>
            <p><strong>BTC Balance:</strong> <span id="btc-balance">0</span></p>
            <p><strong>YARA Balance:</strong> <span id="yara-balance">0</span></p>
            <p><strong>Staked:</strong> <span id="staked-balance">0</span></p>
        </div>
        <div>
            <h3>🐱 Staking</h3>
            <button id="approve-btn" class="btn" disabled>Approve</button>
            <button id="stake-btn" class="btn" disabled>Stake</button>
            <button id="unstake-btn" class="btn" disabled>Unstake</button>
        </div>
        <div id="status">Waiting for connection...</div>
    </div>
    <script>
        const OWNER = "opt1pcx4nk6acad6z43qt0fh5t7lcdt65yp2uh3mcvzc3h0vxkurkhkus8l8q8m";
        const TOKEN = "0x403925f98169763bd2dd78b73cdc20421a4b2df7fa3ea171abba278dce2458ca";

        const connectBtn = document.getElementById("connect-btn");
        const mintBtn = document.getElementById("mint-btn");
        const statusDiv = document.getElementById("status");
        const addrSpan = document.getElementById("user-address");

        function log(msg) {
            const time = new Date().toLocaleTimeString();
            statusDiv.innerHTML = `<div>> [${time}] ${msg}</div>` + statusDiv.innerHTML;
        }

        async function connect() {
            try {
                if (!window.unisat && !window.opnet) {
                    alert("Please install UniSat or OP Wallet!");
                    log("Error: Wallet not found");
                    return;
                }

                log("Connecting wallet...");
                const accounts = await (window.unisat || window.opnet).requestAccounts();
                const address = accounts[0];

                addrSpan.innerText = address;
                connectBtn.innerText = "Connected 🐾";
                connectBtn.disabled = true;

                if (address.toLowerCase() === OWNER.toLowerCase()) {
                    mintBtn.disabled = false;
                    log("Welcome owner! Minting available");
                } else {
                    log("Connected as: " + address);
                }

                document.getElementById("btc-balance").innerText = "0.0005";
                document.getElementById("yara-balance").innerText = "200";

            } catch (e) {
                log("Error: " + e.message);
            }
        }

        connectBtn.onclick = connect;
        log("Ready to connect");
    </script>
</body>
</html>
